# Información del Proyecto
site_name: Cloud Computing & Big Data
site_url: https://jomucon21muri.github.io/CC-BD/
site_author: Universidad Internacional de Valencia
site_description: >-
  Curso completo de Cloud & Big Data: Del dato oficial al conocimiento 
  accionable mediante arquitecturas cloud, análisis multidimensional 
  y minería de datos inteligente.

# Repositorio
repo_name: Jomucon21muri/CC-BD
repo_url: https://github.com/Jomucon21muri/CC-BD

# Copyright
copyright: Copyright &copy; 2026 Universidad Internacional de Valencia

# Tema
theme:
  name: material
  language: es
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep-orange
      accent: deep-orange
      toggle:
        icon: material/brightness-7
        name: Cambiar a modo oscuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep-orange
      accent: deep-orange
      toggle:
        icon: material/brightness-4
        name: Cambiar a modo claro
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - toc.follow
    - content.code.copy
    - content.code.select
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - content.footnote.tooltips
  icon:
    logo: material/cloud
    repo: fontawesome/brands/github

# Plugins
plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)|&[lg]t;'
      lang:
        - es
        - en
  - glightbox

# Extensiones Markdown
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      permalink_title: Enlace a esta sección
      toc_depth: 2
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
      use_pygments: true
      auto_title: true
      linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      auto_append:
        - includes/abbreviations.md
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

# Recursos adicionales
extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - stylesheets/extra.css

# Configuración extra
extra:

  version:
    provider: mike
    default: latest

# Navegación
nav:
  - Inicio: index.md
  - Bloque 1 - Fundamentos del Dato:
      - Capítulo 1. Economía y gobierno del dato: capitulo1/economia-gobierno-dato.md
      - Capítulo 2. Fuentes oficiales y médicas de datos: capitulo2/fuentes-datos.md
  - Bloque 2 - Cloud Computing:
      - Capítulo 3. Fundamentos de Cloud Computing: capitulo3/fundamentos-cloud.md
      - Capítulo 4. Proveedores cloud (AWS, Azure, GCP): capitulo4/proveedores-cloud.md
      - Capítulo 5. Metodologías DevOps y DataOps: capitulo5/metodologias-devops-dataops.md
  - Bloque 3 - Almacenamiento y Bases de Datos:
      - Capítulo 6. Arquitectura de Data Lake: capitulo6/arquitectura-data-lake.md
      - Capítulo 7. Almacenamiento distribuido: capitulo7/almacenamiento-distribuido.md
      - Capítulo 11. OLTP vs OLAP: capitulo11/oltp-vs-olap.md
  - Bloque 4 - Infraestructura Big Data:
      - Capítulo 10. Hadoop, Spark, Kafka y Airflow: capitulo10/infraestructura-big-data.md
  - Bloque 5 - Análisis y Minería de Datos:
      - Capítulo 8. Fundamentos de Big Data: capitulo8/fundamentos-big-data.md
      - Capítulo 8. Minería de datos y CRISP-DM: capitulo8/mineria-datos-metodologias.md
      - Capítulo 9. Metodologías avanzadas (KDD, ASUM-DM, TDSP): capitulo9/metodologias-avanzadas.md
  - Bloque 6 - Gobierno de Datos:
      - Capítulo 12. Calidad y trazabilidad: capitulo12/calidad-trazabilidad.md
      - Capítulo 12. Protección de datos (RGPD): capitulo12/proteccion-datos.md
      - Capítulo 12. Anonimización y privacidad: capitulo12/anonimizacion.md
  - Proyecto Final:
      - Capítulo 13. Caso práctico integrador: capitulo13/proyecto-final.md
